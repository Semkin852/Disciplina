<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root{
    --bg:#1b1e20;
    --panel:#232729;
    --panel-2:#272b2d;
    --border:#34393c;
    --grid:#222628;
    --text:#ece8e1;
    --text-dim:#83898c;
    --text-faint:#565a5c;
    --accent:#e8602c;
    --accent-dim:#7a3d22;
    --done:#6f9c6a;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(0deg, var(--grid) 0, var(--grid) 1px, transparent 1px, transparent 28px),
      repeating-linear-gradient(90deg, var(--grid) 0, var(--grid) 1px, transparent 1px, transparent 28px),
      var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    width:100%;
    max-width:480px;
    padding:20px 16px 40px;
  }
  .mono{font-family:'IBM Plex Mono', monospace;}

  /* section label */
  .section-lbl{
    font-size:11px;
    letter-spacing:0.12em;
    color:var(--text-faint);
    margin-bottom:8px;
    margin-top:4px;
  }
  .section-lbl.first{margin-top:0;}

  /* ===== tickers (dimension-line style) ===== */
  .tickers{
    margin-bottom:10px;
  }
  .dim-ticker{
    margin-bottom:16px;
  }
  .dim-label{
    display:flex;
    align-items:baseline;
    gap:6px;
    font-size:13px;
    margin-bottom:4px;
  }
  .dim-label .t-name{
    flex:1;
    cursor:pointer;
    word-break:break-word;
  }
  .dim-label .t-pct{
    color:var(--accent);
    font-weight:600;
    cursor:pointer;
  }
  .dim-label .t-del{
    color:var(--text-faint);
    cursor:pointer;
    padding:0 2px;
    font-size:15px;
  }
  .dim-label .t-del:hover{color:var(--accent);}
  .dim-line{
    display:flex;
    align-items:center;
    height:14px;
  }
  .dim-tick{
    width:1px;
    height:10px;
    background:var(--text-dim);
    flex:0 0 auto;
  }
  .dim-track{
    flex:1;
    height:1px;
    background:var(--border);
    position:relative;
    margin:0 1px;
  }
  .dim-fill{
    position:absolute;
    top:0; left:0; bottom:0;
    height:1px;
    background:var(--accent);
  }
  .dim-fill::after{
    content:'';
    position:absolute;
    right:-3px; top:-3.5px;
    width:7px; height:7px;
    border-right:1.5px solid var(--accent);
    border-top:1.5px solid var(--accent);
    transform:rotate(45deg);
  }

  .edit-row{
    display:flex;
    gap:6px;
    margin-bottom:4px;
  }
  .edit-row input[type="text"]{
    flex:1;
    min-width:0;
  }
  .edit-row input[type="number"]{
    width:54px;
    text-align:center;
  }
  .edit-row input{
    background:var(--panel);
    border:1px solid var(--accent);
    border-radius:3px;
    color:var(--text);
    padding:6px 8px;
    font-size:13px;
    font-family:'IBM Plex Sans', sans-serif;
  }
  .edit-row input:focus{outline:none;}

  .ticker-add-row input[type="text"]{flex:1;}
  .ticker-add-row input[type="number"]{width:54px;text-align:center;flex:0 0 auto;}

  /* header */
  .head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
    padding:14px 0;
    margin-bottom:18px;
  }
  .head h1{
    font-size:20px;
    letter-spacing:0.12em;
    margin:0 0 4px;
    font-weight:600;
  }
  .head .date{
    color:var(--text-dim);
    font-size:13px;
    text-transform:capitalize;
  }
  .ticket{
    text-align:right;
    color:var(--text-faint);
    font-size:11px;
    letter-spacing:0.05em;
  }
  .ticket .num{
    color:var(--accent);
    font-size:13px;
    font-weight:600;
  }

  /* streak */
  .streak-row{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:18px;
  }
  .streak-box{
    border:1px solid var(--accent);
    border-radius:4px;
    padding:8px 16px;
    text-align:center;
    background:var(--panel);
    min-width:64px;
  }
  .streak-box .n{
    font-size:28px;
    font-weight:700;
    color:var(--accent);
    line-height:1;
  }
  .streak-label{
    color:var(--text-dim);
    font-size:13px;
    line-height:1.3;
  }

  /* week strip */
  .week{
    display:flex;
    justify-content:space-between;
    margin-bottom:22px;
    gap:4px;
  }
  .day-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    flex:1;
  }
  .day-col .lbl{
    font-size:10px;
    color:var(--text-faint);
    letter-spacing:0.05em;
  }
  .day-col .sq{
    width:22px;
    height:22px;
    border-radius:3px;
    border:1px solid var(--border);
  }
  .sq.done{background:var(--accent);border-color:var(--accent);}
  .sq.partial{background:var(--panel-2);border-color:var(--text-faint);}
  .sq.future{background:transparent;border-style:dashed;border-color:var(--border);}
  .sq.empty{background:var(--panel);border-color:var(--border);}
  .sq.today{box-shadow:0 0 0 2px var(--bg), 0 0 0 3px var(--text-dim);}

  /* priority */
  .priority-box{
    border:1px solid var(--accent-dim);
    border-left:3px solid var(--accent);
    border-radius:3px;
    background:var(--panel);
    padding:10px 10px 4px;
    margin-bottom:20px;
    min-height:24px;
  }
  .priority-box .empty-hint{
    color:var(--text-faint);
    font-size:13px;
    padding:2px 4px 6px;
  }
  .priority-box .task-row{ border-bottom:none; padding:4px 2px; }

  /* tasks */
  .tasks{
    margin-bottom:16px;
  }
  .task-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:9px 2px;
    border-bottom:1px solid var(--border);
  }
  .task-row .box{
    width:18px;
    height:18px;
    flex:0 0 18px;
    border:1.5px solid var(--text-dim);
    border-radius:2px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .task-row.done .box{background:var(--done);border-color:var(--done);}
  .task-row.done .box::after{content:'✓';color:var(--bg);font-size:12px;font-weight:700;}
  .task-row .txt{
    flex:1;
    font-size:14.5px;
    cursor:pointer;
    word-break:break-word;
    min-width:0;
  }
  .task-row.done .txt{color:var(--text-faint);text-decoration:line-through;}
  .task-row .badge{
    flex:0 0 auto;
    font-size:10.5px;
    color:var(--text-dim);
    border:1px solid var(--border);
    border-radius:2px;
    padding:1px 5px;
  }
  .task-row .star{
    color:var(--text-faint);
    cursor:pointer;
    font-size:15px;
    padding:0 2px;
    flex:0 0 auto;
  }
  .task-row .star.on{color:var(--accent);}
  .task-row .chevron{
    color:var(--text-faint);
    cursor:pointer;
    font-size:12px;
    padding:0 4px;
    flex:0 0 auto;
    width:14px;
    text-align:center;
  }
  .task-row .del{
    color:var(--text-faint);
    cursor:pointer;
    font-size:16px;
    padding:0 4px;
    flex:0 0 auto;
  }
  .task-row .del:hover{color:var(--accent);}

  /* subtask drill-down */
  .subtask-panel{
    margin:0 0 8px 26px;
    padding:2px 0 6px 12px;
    border-left:1px dashed var(--border);
  }
  .subtask-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:5px 0;
  }
  .sub-box{
    width:14px;
    height:14px;
    flex:0 0 14px;
    border:1.3px solid var(--text-dim);
    border-radius:2px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .sub-box.done{background:var(--done);border-color:var(--done);}
  .sub-box.done::after{content:'✓';color:var(--bg);font-size:9px;font-weight:700;}
  .sub-txt{
    flex:1;
    font-size:13px;
    cursor:pointer;
    word-break:break-word;
    min-width:0;
  }
  .sub-txt.done{color:var(--text-faint);text-decoration:line-through;}
  .sub-del{
    color:var(--text-faint);
    cursor:pointer;
    font-size:14px;
    padding:0 4px;
    flex:0 0 auto;
  }
  .sub-del:hover{color:var(--accent);}
  .sub-add-row{
    display:flex;
    gap:6px;
    margin-top:4px;
  }
  .sub-add-row input{
    flex:1;
    min-width:0;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:3px;
    color:var(--text);
    padding:6px 8px;
    font-size:13px;
    font-family:'IBM Plex Sans', sans-serif;
  }
  .sub-add-row input::placeholder{color:var(--text-faint);}
  .sub-add-row input:focus{outline:none;border-color:var(--accent);}
  .sub-add-row button{
    background:transparent;
    border:1px solid var(--accent);
    color:var(--accent);
    border-radius:3px;
    padding:0 12px;
    font-size:14px;
    cursor:pointer;
  }

  /* add row (shared) */
  .add-row{
    display:flex;
    gap:8px;
    margin-bottom:24px;
  }
  .add-row input{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:3px;
    color:var(--text);
    padding:10px 12px;
    font-size:14px;
    font-family:'IBM Plex Sans', sans-serif;
  }
  .add-row input::placeholder{color:var(--text-faint);}
  .add-row input:focus{outline:none;border-color:var(--accent);}
  .add-row button{
    background:var(--accent);
    border:none;
    color:var(--bg);
    border-radius:3px;
    padding:0 16px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
  }

  /* footer stats */
  .stats{
    display:flex;
    justify-content:space-between;
    border-top:1px solid var(--border);
    padding-top:14px;
    color:var(--text-dim);
    font-size:12.5px;
  }
  .stats .v{color:var(--text);font-weight:600;}

  .reset-link{
    text-align:center;
    margin-top:26px;
    font-size:11px;
    color:var(--text-faint);
    cursor:pointer;
    text-decoration:underline;
  }

  .transfer-box{
    border-top:1px solid var(--border);
    padding-top:14px;
    margin-top:18px;
  }
  .transfer-box .hint{
    color:var(--text-faint);
    font-size:11.5px;
    margin-bottom:8px;
    line-height:1.4;
  }
  .transfer-box textarea{
    width:100%;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:3px;
    color:var(--text-dim);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    padding:8px;
    resize:none;
    margin-bottom:8px;
  }
  #exportArea{ height:60px; display:none; }
  #importArea{ height:50px; }
  .transfer-box .btn-row{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .transfer-box button{
    flex:1;
    background:transparent;
    border:1px solid var(--accent);
    color:var(--accent);
    border-radius:3px;
    padding:8px 10px;
    font-size:12.5px;
    cursor:pointer;
  }
  .transfer-box .copied-hint{
    color:var(--done);
    font-size:11px;
    margin:-4px 0 8px;
    display:none;
  }

  .loading{
    text-align:center;
    color:var(--text-faint);
    padding:60px 0;
    font-size:13px;
  }

  /* ===== home: categories ===== */
  .back-link{
    color:var(--text-dim);
    font-size:12px;
    cursor:pointer;
    margin-bottom:16px;
    display:inline-block;
  }
  .back-link:hover{color:var(--accent);}

  .category-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:10px;
    margin-bottom:26px;
  }
  .category-tile{
    aspect-ratio: 1 / 1;
    border-radius:4px;
    padding:14px;
    cursor:pointer;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    color:#fff;
    overflow:hidden;
  }
  .category-tile.c0{ background:var(--accent); }
  .category-tile.c1{ background:#2d3338; }
  .category-tile.c2{ background:#7a3d22; }
  .category-tile.c3{ background:#3a4146; }
  .category-tile .name{
    font-size:16px;
    font-weight:700;
    line-height:1.2;
    word-break:break-word;
    margin-bottom:4px;
  }
  .category-tile .sub{
    font-size:11px;
    color:rgba(255,255,255,0.75);
  }
  .category-tile .del{
    position:absolute;
    top:8px; right:10px;
    color:rgba(255,255,255,0.65);
    font-size:15px;
    cursor:pointer;
    padding:2px;
    line-height:1;
  }
  .category-tile .del:hover{ color:#fff; }
  .category-add-tile{
    aspect-ratio: 1 / 1;
    border-radius:4px;
    border:1.5px dashed var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    color:var(--accent);
    font-size:30px;
  }
  .category-add-form{
    aspect-ratio: 1 / 1;
    border-radius:4px;
    background:var(--panel);
    border:1px solid var(--accent);
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:12px;
    gap:8px;
  }
  .category-add-form input{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:3px;
    color:var(--text);
    padding:6px 8px;
    font-size:13px;
    font-family:'IBM Plex Sans', sans-serif;
  }
  .category-add-form input:focus{ outline:none; border-color:var(--accent); }
  .category-add-form button{
    background:var(--accent);
    border:none;
    color:var(--bg);

<body>
<div id="app"><div class="loading">загрузка…</div></div>

<script>
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const WEEKDAYS_FULL = ['понедельник','вторник','среда','четверг','пятница','суббота','воскресенье'];
const WEEKDAYS_SHORT = ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
const PALETTE = ['#e8602c','#2d3338','#7a3d22','#3a4146','#3d6e74','#4a5a8a'];

let state = {
  view: 'home',
  categories: [],
  currentCategoryId: null,
  addingCategory: false,
  newCategoryColor: PALETTE[0],
  pendingCategoryName: '',
  movingTaskId: null,
  tasksCurrent: null, history: {}, tickers: [], links: [], atoms: [], expandedAtomIds: new Set(), expandedIds: new Set()
};

function fmt(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function mon0(d){ return (d.getDay()+6)%7; }
function todayDate(){ return new Date(); }
function todayStr(){ return fmt(todayDate()); }

function escapeHtml(s){
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function newId(prefix){
  return prefix+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
}

function keyFor(catId, base){
  return catId === 'default' ? base : `cat:${catId}:${base}`;
}

async function safeGet(key){
  try{
    return localStorage.getItem(key);
  }catch(e){ return null; }
}
async function safeSet(key, value){
  try{ localStorage.setItem(key, value); }catch(e){ console.error('storage set failed', key, e); }
}
async function safeDelete(key){
  try{ localStorage.removeItem(key); }catch(e){}
}

function normalizeTasks(tasks){
  return (tasks||[]).map(t=>({
    ...t,
    subtasks: (t.subtasks||[]).map(s=>({...s}))
  }));
}

function archiveDay(history, dateStr, tasks){
  if(!tasks || tasks.length===0) return history;
  const done = tasks.filter(t=>t.done).length;
  history[dateStr] = { total: tasks.length, done, completedAll: done===tasks.length };
  return history;
}

async function loadCategories(){
  let raw = await safeGet('categories');
  let cats = raw ? JSON.parse(raw) : null;
  if(!cats || cats.length===0){
    cats = [{ id:'default', name:'Дисциплина' }];
    await safeSet('categories', JSON.stringify(cats));
  }
  return cats;
}

async function persistCategories(){
  await safeSet('categories', JSON.stringify(state.categories));
}

async function init(){
  state.categories = await loadCategories();
  state.view = 'home';
  buildHomeShell();
  renderHome();
}

async function openCategory(id){
  let historyRaw = await safeGet(keyFor(id, 'history'));
  let history = historyRaw ? JSON.parse(historyRaw) : {};

  let curRaw = await safeGet(keyFor(id, 'tasks-current'));
  let cur = curRaw ? JSON.parse(curRaw) : null;
  if(cur) cur.tasks = normalizeTasks(cur.tasks);

  let tickersRaw = await safeGet(keyFor(id, 'tickers'));
  let tickers = tickersRaw ? JSON.parse(tickersRaw) : [];
  tickers = tickers.map(t=>({...t, files: t.files || []}));

  let linksRaw = await safeGet(keyFor(id, 'links'));
  let links = linksRaw ? JSON.parse(linksRaw) : [];

  let atomsRaw = await safeGet(keyFor(id, 'atoms'));
  let atoms = atomsRaw ? JSON.parse(atomsRaw) : [];
  atoms = atoms.map(g=>({...g, items:(g.items||[]).map(it=>({...it}))}));

  const t = todayStr();

  if(cur && cur.date !== t){
    history = archiveDay(history, cur.date, cur.tasks);
    await safeSet(keyFor(id, 'history'), JSON.stringify(history));
    const carried = normalizeTasks(cur.tasks.filter(x=>!x.done));
    cur = { date: t, tasks: carried };
    await safeSet(keyFor(id, 'tasks-current'), JSON.stringify(cur));
  } else if(!cur){
    cur = { date: t, tasks: [] };
    await safeSet(keyFor(id, 'tasks-current'), JSON.stringify(cur));
  }

  state.currentCategoryId = id;
  state.history = history;
  state.tasksCurrent = cur;
  state.tickers = tickers;
  state.links = links;
  state.atoms = atoms;
  state.expandedAtomIds = new Set();
  state.expandedIds = new Set();
  state.movingTaskId = null;
  state.view = 'category';

  buildShell();
  renderAll();
}

function goHome(){
  state.view = 'home';
  state.addingCategory = false;
  buildHomeShell();
  renderHome();
}

function combinedHistory(){
  const combined = {...state.history};
  const tasks = state.tasksCurrent.tasks;
  if(tasks.length>0){
    const done = tasks.filter(x=>x.done).length;
    combined[state.tasksCurrent.date] = { total: tasks.length, done, completedAll: done===tasks.length };
  }
  return combined;
}

function computeStreak(combined){
  let count = 0;
  let d = todayDate();
  while(true){
    const ds = fmt(d);
    const rec = combined[ds];
    if(rec && rec.total>0 && rec.completedAll){
      count++;
      d = new Date(d.getTime() - 86400000);
    } else break;
  }
  return count;
}

function computeWeekStrip(combined){
  const today = todayDate();
  const monIndex = mon0(today);
  const monday = new Date(today.getTime() - monIndex*86400000);
  const todayStrVal = fmt(today);
  const cols = [];
  for(let i=0;i<7;i++){
    const d = new Date(monday.getTime() + i*86400000);
    const ds = fmt(d);
    let status;
    if(ds > todayStrVal) status = 'future';
    else{
      const rec = combined[ds];
      if(!rec || rec.total===0) status = 'empty';
      else status = rec.completedAll ? 'done' : 'partial';
    }
    cols.push({ label: WEEKDAYS_SHORT[i], status, isToday: ds===todayStrVal });
  }
  return cols;
}

function computeStats(combined){
  const today = todayDate();
  let sumDone7=0, sumTotal7=0;
  for(let i=0;i<7;i++){
    const d = new Date(today.getTime() - i*86400000);
    const rec = combined[fmt(d)];
    if(rec){ sumDone7+=rec.done; sumTotal7+=rec.total; }
  }
  const pct7 = sumTotal7>0 ? Math.round(sumDone7/sumTotal7*100) : 0;

  let allDone=0;
  Object.values(combined).forEach(r=>{ allDone += r.done; });

  const ticketNum = String(Object.keys(combined).length).padStart(3,'0');

  return { pct7, allDone, ticketNum };
}

function buildHomeShell(){
  document.getElementById('app').innerHTML = `
    <div class="head" style="border-top:none;">
      <div>
        <h1>ДИСЦИПЛИНА</h1>
        <div class="date" id="homeDateLine"></div>
      </div>
    </div>

    <div class="search-row">
      <input type="text" id="searchInput" placeholder="поиск задач по всем категориям">
      <div class="search-results" id="searchResults"></div>
    </div>

    <div class="section-lbl">КАТЕГОРИИ</div>
    <div class="category-grid" id="categoryRow"></div>

    <div class="section-lbl">ДАННЫЕ</div>
    <div class="backup-row">
      <button id="exportAllBtn">скачать бэкап</button>
      <button id="importAllBtn">восстановить из файла</button>
    </div>
    <input type="file" id="importFileInput" accept="application/json" style="display:none;">
  `;
  const today = todayDate();
  document.getElementById('homeDateLine').textContent =
    `${today.getDate()} ${MONTHS[today.getMonth()]} · ${WEEKDAYS_FULL[mon0(today)]}`;

  let searchTimer = null;
  document.getElementById('searchInput').addEventListener('input', ()=>{
    clearTimeout(searchTimer);
    searchTimer = setTimeout(onSearchInput, 200);
  });
  document.getElementById('exportAllBtn').onclick = exportAllData;
  document.getElementById('importAllBtn').onclick = ()=>{
    document.getElementById('importFileInput').click();
  };
  document.getElementById('importFileInput').addEventListener('change', onImportFileChange);
}

function renderHome(){
  const row = document.getElementById('categoryRow');
  if(!row) return;

  row.innerHTML = state.categories.map((c,i)=>{
    const styleAttr = c.color ? ` style="background:${c.color}"` : '';
    const cls = c.color ? '' : ` c${i%4}`;
    return `
    <div class="category-tile${cls}" data-id="${c.id}"${styleAttr}>
      <div class="del">×</div>
      <div class="name">${escapeHtml(c.name)}</div>
      <div class="sub mono" id="sub_${c.id}">…</div>
    </div>
  `;
  }).join('') + (
    state.addingCategory
      ? `<div class="category-add-form">
           <input type="text" id="newCategoryName" placeholder="название" maxlength="40" value="${escapeHtml(state.pendingCategoryName)}">
           <div class="color-swatches" id="colorSwatches">
             ${PALETTE.map((hex,idx)=>`<div class="swatch${hex===state.newCategoryColor?' selected':''}" data-color="${hex}" style="background:${hex}"></div>`).join('')}
           </div>
           <button id="confirmCategoryBtn">+</button>
         </div>`
      : `<div class="category-add-tile" id="addCategoryTile">+</div>`
  );

  if(state.addingCategory){
    document.getElementById('colorSwatches').querySelectorAll('.swatch').forEach(sw=>{
      sw.onclick = ()=>{
        state.newCategoryColor = sw.getAttribute('data-color');
        renderHome();
      };
    });
  }

  state.categories.forEach(c=>{
    const tile = row.querySelector(`.category-tile[data-id="${c.id}"]`);
    if(!tile) return;
    tile.onclick = ()=>openCategory(c.id);
    tile.querySelector('.del').onclick = (e)=>{ e.stopPropagation(); onDeleteCategory(c.id, c.name); };
    loadCategoryPreview(c.id);
  });

  if(state.addingCategory){
    const input = document.getElementById('newCategoryName');
    const btn = document.getElementById('confirmCategoryBtn');
    const commit = ()=>{
      const name = input.value.trim();
      if(!name) { state.addingCategory=false; state.pendingCategoryName=''; renderHome(); return; }
      const id = newId('catg');
      state.categories.push({ id, name, color: state.newCategoryColor });
      state.addingCategory = false;
      state.pendingCategoryName = '';
      state.newCategoryColor = PALETTE[0];
      persistCategories();
      renderHome();
    };
    input.addEventListener('input', ()=>{ state.pendingCategoryName = input.value; });
    btn.onclick = commit;
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') commit(); });
    input.focus();
  } else {
    const addTile = document.getElementById('addCategoryTile');
    if(addTile) addTile.onclick = ()=>{ state.addingCategory = true; renderHome(); };
  }
}

async function loadCategoryPreview(id){
  const raw = await safeGet(keyFor(id, 'tasks-current'));
  const el = document.getElementById(`sub_${id}`);
  if(!el) return;
  if(!raw){ el.textContent = 'пусто'; return; }
  try{
    const cur = JSON.parse(raw);
    const tasks = normalizeTasks(cur.tasks);
    if(!tasks.length){ el.textContent = 'пусто'; return; }
    const done = tasks.filter(t=>{
      const comp = taskCompletion(t);
      return comp ? comp.done===comp.total : t.done;
    }).length;
    el.textContent = `${done}/${tasks.length} сегодня`;
  }catch(e){ el.textContent = 'пусто'; }
}

async function onDeleteCategory(id, name){
  if(state.categories.length<=1){
    alert('Должна остаться хотя бы одна категория.');
    return;
  }
  if(!confirm(`Удалить категорию «${name}» и все её данные? Это нельзя отменить.`)) return;
  await safeDelete(keyFor(id, 'tasks-current'));
  await safeDelete(keyFor(id, 'history'));
  await safeDelete(keyFor(id, 'tickers'));
  await safeDelete(keyFor(id, 'links'));
  await safeDelete(keyFor(id, 'atoms'));
  state.categories = state.categories.filter(c=>c.id!==id);
  await persistCategories();
  renderHome();
}

async function onSearchInput(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const resultsEl = document.getElementById('searchResults');
  if(!q){ resultsEl.innerHTML=''; resultsEl.style.display='none'; return; }

  let matches = [];
  for(const c of state.categories){
    const raw = await safeGet(keyFor(c.id, 'tasks-current'));
    if(!raw) continue;
    let cur;
    try{ cur = JSON.parse(raw); }catch(e){ continue; }
    const tasks = normalizeTasks(cur.tasks);
    tasks.forEach(t=>{
      if(t.text.toLowerCase().includes(q)){
        matches.push({ catId:c.id, catName:c.name, text:t.text });
      }
      (t.subtasks||[]).forEach(s=>{
        if(s.text.toLowerCase().includes(q)){
          matches.push({ catId:c.id, catName:c.name, text:s.text });
        }
      });
    });
  }

  resultsEl.style.display = 'block';
  resultsEl.innerHTML = matches.length
    ? matches.map(m=>`<div class="search-result" data-cat="${m.catId}"><span class="sr-cat">${escapeHtml(m.catName)}</span> — ${escapeHtml(m.text)}</div>`).join('')
    : `<div class="search-empty">ничего не найдено</div>`;
  resultsEl.querySelectorAll('.search-result').forEach(el=>{
    el.onclick = ()=>openCategory(el.getAttribute('data-cat'));
  });
}

async function exportAllData(){
  const payload = { categories: state.categories, data: {} };
  for(const c of state.categories){
    const tc = await safeGet(keyFor(c.id, 'tasks-current'));
    const hi = await safeGet(keyFor(c.id, 'history'));
    const tk = await safeGet(keyFor(c.id, 'tickers'));
    const lk = await safeGet(keyFor(c.id, 'links'));
    const at = await safeGet(keyFor(c.id, 'atoms'));
    payload.data[c.id] = {
      tasksCurrent: tc ? JSON.parse(tc) : null,
      history: hi ? JSON.parse(hi) : {},
      tickers: tk ? JSON.parse(tk) : [],
      links: lk ? JSON.parse(lk) : [],
      atoms: at ? JSON.parse(at) : []
    };
  }
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `disciplina-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function onImportFileChange(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (ev)=>{
    let payload;
    try{ payload = JSON.parse(ev.target.result); }
    catch(err){ alert('Не удалось прочитать файл бэкапа.'); return; }
    if(!payload || !payload.categories || !payload.data){
      alert('Файл повреждён или это бэкап другой версии.');
      return;
    }
    if(!confirm('Это заменит текущие категории и данные содержимым бэкапа. Продолжить?')) return;

    state.categories = payload.categories;
    await persistCategories();
    for(const c of state.categories){
      const d = payload.data[c.id] || {};
      await safeSet(keyFor(c.id, 'tasks-current'), JSON.stringify(d.tasksCurrent || { date: todayStr(), tasks: [] }));
      await safeSet(keyFor(c.id, 'history'), JSON.stringify(d.history || {}));
      await safeSet(keyFor(c.id, 'tickers'), JSON.stringify(d.tickers || []));
      await safeSet(keyFor(c.id, 'links'), JSON.stringify(d.links || []));
      await safeSet(keyFor(c.id, 'atoms'), JSON.stringify(d.atoms || []));
    }
    alert('Бэкап восстановлен.');
    e.target.value = '';
    goHome();
  };
  reader.readAsText(file);
}

/* ===== links ===== */
function normalizeUrl(raw){
  let s = raw.trim();
  if(!s) return null;
  if(!/^https?:\/\//i.test(s)) s = 'https://' + s;
  try{
    const u = new URL(s);
    return u.href;
  }catch(e){ return null; }
}

function hostnameOf(url){
  try{ return new URL(url).hostname.replace(/^www\./,''); }catch(e){ return url; }
}

function renderLinks(){
  const row = document.getElementById('linksRow');
  if(!row) return;
  row.innerHTML = state.links.map(l=>{
    const domain = hostnameOf(l.url);
    if(l.editing){
      return `
        <div class="link-tile" data-id="${l.id}" style="cursor:default;">
          <div class="link-edit-row">
            <input type="text" class="edit-link-title" value="${escapeHtml(l.title || domain)}" maxlength="60">
          </div>
        </div>`;
    }
    return `
      <div class="link-tile" data-id="${l.id}">
        <div class="lt-del">×</div>
        <img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=64" alt="">
        <div class="lt-title">${escapeHtml(l.title || domain)}</div>
        <div class="lt-domain">${escapeHtml(domain)}</div>
      </div>`;
  }).join('');

  state.links.forEach(l=>{
    const tile = row.querySelector(`.link-tile[data-id="${l.id}"]`);
    if(!tile) return;
    if(l.editing){
      const input = tile.querySelector('.edit-link-title');
      const commit = ()=>{
        const v = input.value.trim();
        l.title = v || hostnameOf(l.url);
        l.editing = false;
        persistLinks();
        renderLinks();
      };
      input.addEventListener('keydown', e=>{ if(e.key==='Enter') commit(); });
      input.addEventListener('blur', ()=>setTimeout(commit, 0));
      input.focus();
      input.select();
    } else {
      tile.querySelector('.lt-del').onclick = (e)=>{
        e.stopPropagation();
        state.links = state.links.filter(x=>x.id!==l.id);
        persistLinks();
        renderLinks();
      };
      tile.querySelector('.lt-title').onclick = (e)=>{
        e.stopPropagation();
        l.editing = true;
        renderLinks();
      };
      tile.onclick = ()=>{ window.open(l.url, '_blank'); };
    }
  });
}

/* ===== atoms (independent breakdown, not tied to days or tasks) ===== */
function atomCompletion(a){
  if(a.steps && a.steps.length>0){
    const done = a.steps.filter(s=>s.done).length;
    return { done, total: a.steps.length };
  }
  return null;
}

function renderAtomRowHtml(a){
  const comp = atomCompletion(a);
  const isDone = comp ? comp.done===comp.total : false;
  const expanded = state.expandedAtomIds.has(a.id);
  return `
    <div class="task-row${isDone?' done':''}" data-id="${a.id}">
      <div class="box"></div>
      <div class="txt">${escapeHtml(a.name)}</div>
      ${comp ? `<div class="badge mono">${comp.done}/${comp.total}</div>` : ''}
      <div class="chevron">${expanded?'▾':'▸'}</div>
      <div class="del">×</div>
    </div>
    ${expanded ? renderAtomStepsPanelHtml(a) : ''}
  `;
}

function renderAtomStepsPanelHtml(a){
  const steps = a.steps || [];
  return `
    <div class="subtask-panel" data-parent="${a.id}">
      ${steps.map(s=>`
        <div class="subtask-row" data-id="${s.id}">
          <div class="sub-box${s.done?' done':''}"></div>
          <div class="sub-txt${s.done?' done':''}">${escapeHtml(s.text)}</div>
          <div class="sub-del">×</div>
        </div>
      `).join('')}
      <div class="sub-add-row">
        <input type="text" class="sub-add-input" placeholder="атомарный шаг…" maxlength="150">
        <button class="sub-add-btn">+</button>
      </div>
    </div>
  `;
}

function renderAtoms(){
  const list = document.getElementById('atomList');
  if(!list) return;
  list.innerHTML = state.atoms.map(a=>renderAtomRowHtml(a)).join('');

  list.querySelectorAll('.task-row').forEach(row=>{
    const id = row.getAttribute('data-id');
    row.querySelector('.box').onclick = ()=>toggleAtomDone(id);
    row.querySelector('.txt').onclick = ()=>toggleAtomDone(id);
    row.querySelector('.chevron').onclick = ()=>toggleAtomExpand(id);
    row.querySelector('.del').onclick = ()=>deleteAtom(id);
  });
  list.querySelectorAll('.subtask-panel').forEach(panel=>{
    const parentId = panel.getAttribute('data-parent');
    panel.querySelectorAll('.subtask-row').forEach(srow=>{
      const sid = srow.getAttribute('data-id');
      srow.querySelector('.sub-box').onclick = ()=>toggleAtomStepDone(parentId, sid);
      srow.querySelector('.sub-txt').onclick = ()=>toggleAtomStepDone(parentId, sid);
      srow.querySelector('.sub-del').onclick = ()=>deleteAtomStep(parentId, sid);
    });
    const input = panel.querySelector('.sub-add-input');
    const btn = panel.querySelector('.sub-add-btn');
    const commit = ()=>{
      const txt = input.value.trim();
      if(!txt) return;
      addAtomStep(parentId, txt);
    };
    btn.onclick = commit;
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') commit(); });
  });
}

function onAddAtom(){
  const input = document.getElementById('newAtomInput');
  const text = input.value.trim();
  if(!text) return;
  state.atoms.push({ id:newId('atom'), name:text, steps:[] });
  input.value = '';
  persistAtoms();
  renderAtoms();
}

function toggleAtomDone(id){
  const a = state.atoms.find(x=>x.id===id);
  if(!a || !a.steps || a.steps.length===0) return;
  const allDone = a.steps.every(s=>s.done);
  const newVal = !allDone;
  a.steps.forEach(s=>s.done=newVal);
  persistAtoms();
  renderAtoms();
}

function toggleAtomExpand(id){
  if(state.expandedAtomIds.has(id)) state.expandedAtomIds.delete(id);
  else state.expandedAtomIds.add(id);
  renderAtoms();
}

function addAtomStep(atomId, text){
  const a = state.atoms.find(x=>x.id===atomId);
  if(!a) return;
  if(!a.steps) a.steps = [];
  a.steps.push({ id:newId('atomstep'), text, done:false });
  persistAtoms();
  renderAtoms();
}

function toggleAtomStepDone(atomId, stepId){
  const a = state.atoms.find(x=>x.id===atomId);
  if(!a) return;
  const s = a.steps.find(x=>x.id===stepId);
  if(!s) return;
  s.done = !s.done;
  persistAtoms();
  renderAtoms();
}

function deleteAtomStep(atomId, stepId){
  const a = state.atoms.find(x=>x.id===atomId);
  if(!a) return;
  a.steps = a.steps.filter(x=>x.id!==stepId);
  persistAtoms();
  renderAtoms();
}

function deleteAtom(id){
  state.atoms = state.atoms.filter(x=>x.id!==id);
  state.expandedAtomIds.delete(id);
  persistAtoms();
  renderAtoms();
}

async function persistAtoms(){
  await safeSet(keyFor(state.currentCategoryId, 'atoms'), JSON.stringify(state.atoms));
}

const MAX_ATTACH_BYTES = 1.5 * 1024 * 1024;

function onTickerFileChange(tickerId, e){
  const file = e.target.files[0];
  if(!file) return;
  if(file.size > MAX_ATTACH_BYTES){
    alert('Файл больше 1.5 МБ — общее хранилище общее на всё приложение, лучше выбрать файл поменьше.');
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const t = state.tickers.find(x=>x.id===tickerId);
    if(!t) return;
    if(!t.files) t.files = [];
    const mime = /pdf/i.test(file.type) || /\.pdf$/i.test(file.name) ? 'pdf' : 'xls';
    t.files.push({ id:newId('file'), name:file.name, mime, size:file.size, dataUrl: ev.target.result });
    persistTickers();
    renderTickers();
  };
  reader.onerror = ()=>{ alert('Не удалось прочитать файл.'); };
  reader.readAsDataURL(file);
}

function downloadTickerFile(tickerId, fileId){
  const t = state.tickers.find(x=>x.id===tickerId);
  if(!t) return;
  const f = (t.files||[]).find(x=>x.id===fileId);
  if(!f) return;
  const a = document.createElement('a');
  a.href = f.dataUrl;
  a.download = f.name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function removeTickerFile(tickerId, fileId){
  const t = state.tickers.find(x=>x.id===tickerId);
  if(!t) return;
  t.files = (t.files||[]).filter(x=>x.id!==fileId);
  persistTickers();
  renderTickers();
}

function onAddTicker(){
  const nameInput = document.getElementById('newTickerName');
  const pctInput = document.getElementById('newTickerPct');
  const name = nameInput.value.trim();
  if(!name) return;
  let pct = parseInt(pctInput.value, 10);
  if(isNaN(pct)) pct = 0;
  pct = Math.max(0, Math.min(100, pct));
  const id = newId('ticker');
  state.tickers.push({ id, name, percent: pct, editing:false, files:[] });
  nameInput.value=''; pctInput.value='';
  persistTickers();
  renderTickers();
}

async function persistTickers(){
  const clean = state.tickers.map(({editing, ...rest})=>rest);
  await safeSet(keyFor(state.currentCategoryId, 'tickers'), JSON.stringify(clean));
}

  }

}

function renderTaskRowHtml(t){

function renderMovePanelHtml(t){

function renderSubtaskPanelHtml(t){

        <div class="subtask-row" data-id="${s.id}">
          <div class="sub-box${s.done?' done':''}"></div>
          <div class="sub-txt${s.done?' done':''}">${escapeHtml(s.text)}</div>
          <div class="sub-del">×</div>
        </div>

function attachTaskHandlers(container){
  container.querySelectorAll('.task-row').forEach(row=>{
    const id = row.getAttribute('data-id');
    row.querySelector('.box').onclick = ()=>toggleDone(id);
    row.querySelector('.txt').onclick = ()=>toggleDone(id);
    row.querySelector('.star').onclick = ()=>togglePriority(id);
    row.querySelector('.move').onclick = ()=>toggleMove(id);
    row.querySelector('.chevron').onclick = ()=>toggleExpand(id);
    row.querySelector('.del').onclick = ()=>deleteTask(id);
  });
  container.querySelectorAll('.move-panel').forEach(panel=>{
    const taskId = panel.getAttribute('data-move');
    const select = panel.querySelector('.move-select');
    const btn = panel.querySelector('.move-confirm');
    if(select && btn){
      btn.onclick = ()=>moveTaskToCategory(taskId, select.value);
    }
  });
  container.querySelectorAll('.subtask-panel').forEach(panel=>{
    const parentId = panel.getAttribute('data-parent');
    panel.querySelectorAll('.subtask-row').forEach(srow=>{
      const sid = srow.getAttribute('data-id');
      srow.querySelector('.sub-box').onclick = ()=>toggleSubtaskDone(parentId, sid);
      srow.querySelector('.sub-txt').onclick = ()=>toggleSubtaskDone(parentId, sid);
      srow.querySelector('.sub-del').onclick = ()=>deleteSubtask(parentId, sid);
    });
    const input = panel.querySelector('.sub-add-input');
    const btn = panel.querySelector('.sub-add-btn');
    const commit = ()=>{
      const txt = input.value.trim();
      if(!txt) return;
      addSubtask(parentId, txt);
    };
    btn.onclick = commit;
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') commit(); });
  });
}

function recomputeParentDone(t){
  if(t.subtasks && t.subtasks.length>0) t.done = t.subtasks.every(s=>s.done);
}

function computeMonthBars(combined){
  const today = todayDate();
  const bars = [];
  for(let i=29;i>=0;i--){
    const d = new Date(today.getTime() - i*86400000);
    const rec = combined[fmt(d)];
    if(rec && rec.total>0){
      bars.push({ pct: Math.round(rec.done/rec.total*100), hasData:true });
    } else {
      bars.push({ pct:0, hasData:false });
    }
  }
  return bars;
}

function renderAll(){
  renderTickers();
  renderLinks();
  renderAtoms();

  const cat = state.categories.find(c=>c.id===state.currentCategoryId);
  document.getElementById('catTitle').textContent = cat ? cat.name.toUpperCase() : 'ДИСЦИПЛИНА';

  const today = todayDate();
  document.getElementById('dateLine').textContent =
    `${today.getDate()} ${MONTHS[today.getMonth()]} · ${WEEKDAYS_FULL[mon0(today)]}`;

  const combined = combinedHistory();
  const streak = computeStreak(combined);
  document.getElementById('streakNum').textContent = streak;

  const week = computeWeekStrip(combined);
  document.getElementById('weekStrip').innerHTML = week.map(c=>`
    <div class="day-col">
      <div class="lbl">${c.label}</div>
      <div class="sq ${c.status}${c.isToday?' today':''}"></div>
    </div>
  `).join('');

  const monthBars = computeMonthBars(combined);
  document.getElementById('monthChart').innerHTML = monthBars.map(b=>
    `<div class="month-bar${b.hasData?' has-data':''}" style="height:${b.hasData?Math.max(b.pct,4):2}%"></div>`
  ).join('');

  const tasks = state.tasksCurrent.tasks;
  const priorityTask = tasks.find(t=>t.priority);
  const priorityBox = document.getElementById('priorityBox');
  if(priorityTask){
    priorityBox.innerHTML = renderTaskRowHtml(priorityTask);
    attachTaskHandlers(priorityBox);
  } else {
    priorityBox.innerHTML = `<div class="empty-hint">отметь ★ главную задачу дня в списке ниже</div>`;
  }

  const others = tasks.filter(t=>!t.priority);
  const taskList = document.getElementById('taskList');
  taskList.innerHTML = others.map(t=>renderTaskRowHtml(t)).join('');
  attachTaskHandlers(taskList);

  const stats = computeStats(combined);
  document.getElementById('pct7').textContent = stats.pct7+'%';
  document.getElementById('allDone').textContent = stats.allDone;
  document.getElementById('ticketNum').textContent = '№'+stats.ticketNum;
}

async function persistCurrent(){
  await safeSet(keyFor(state.currentCategoryId, 'tasks-current'), JSON.stringify(state.tasksCurrent));
}

function onAddTask(){
  const input = document.getElementById('newTaskInput');
  const text = input.value.trim();
  if(!text) return;
  const id = newId('task');
  state.tasksCurrent.tasks.push({ id, text, done:false, priority:false, subtasks:[] });
  input.value='';
  persistCurrent();
  renderAll();
}

function toggleDone(id){
  const t = state.tasksCurrent.tasks.find(x=>x.id===id);
  if(!t) return;
  if(t.subtasks && t.subtasks.length>0){
    const allDone = t.subtasks.every(s=>s.done);
    const newVal = !allDone;
    t.subtasks.forEach(s=>s.done=newVal);
    t.done = newVal;
  } else {
    t.done = !t.done;
  }
  persistCurrent();
  renderAll();
}

function togglePriority(id){
  const tasks = state.tasksCurrent.tasks;
  const target = tasks.find(x=>x.id===id);
  if(!target) return;
  const turningOn = !target.priority;
  tasks.forEach(x=>x.priority=false);
  target.priority = turningOn;
  persistCurrent();
  renderAll();
}

function toggleExpand(id){
  if(state.expandedIds.has(id)) state.expandedIds.delete(id);
  else state.expandedIds.add(id);
  renderAll();
}

function toggleMove(id){
  state.movingTaskId = state.movingTaskId === id ? null : id;
  renderAll();
}

async function moveTaskToCategory(taskId, targetCatId){
  const idx = state.tasksCurrent.tasks.findIndex(x=>x.id===taskId);
  if(idx===-1) return;
  const [task] = state.tasksCurrent.tasks.splice(idx, 1);
  task.priority = false;
  state.movingTaskId = null;
  await persistCurrent();

  const targetRaw = await safeGet(keyFor(targetCatId, 'tasks-current'));
  let targetCur = targetRaw ? JSON.parse(targetRaw) : { date: todayStr(), tasks: [] };
  targetCur.tasks = normalizeTasks(targetCur.tasks);
  targetCur.tasks.push(task);
  await safeSet(keyFor(targetCatId, 'tasks-current'), JSON.stringify(targetCur));

  renderAll();
}

function addSubtask(taskId, text){
  const t = state.tasksCurrent.tasks.find(x=>x.id===taskId);
  if(!t) return;
  if(!t.subtasks) t.subtasks=[];
  t.subtasks.push({ id:newId('sub'), text, done:false });
  recomputeParentDone(t);
  persistCurrent();
  renderAll();
}

function toggleSubtaskDone(taskId, subId){
  const t = state.tasksCurrent.tasks.find(x=>x.id===taskId);
  if(!t) return;
  const s = t.subtasks.find(x=>x.id===subId);
  if(!s) return;
  s.done = !s.done;
  recomputeParentDone(t);
  persistCurrent();
  renderAll();
}

function deleteSubtask(taskId, subId){
  const t = state.tasksCurrent.tasks.find(x=>x.id===taskId);
  if(!t) return;
  t.subtasks = t.subtasks.filter(x=>x.id!==subId);
  recomputeParentDone(t);
  persistCurrent();
  renderAll();
}

function deleteTask(id){
  state.tasksCurrent.tasks = state.tasksCurrent.tasks.filter(x=>x.id!==id);
  state.expandedIds.delete(id);
  persistCurrent();
  renderAll();
}

async function onReset(){
  if(!confirm('Удалить задачи, дела, ссылки, атомы и историю этой категории? Это нельзя отменить.')) return;
  const id = state.currentCategoryId;
  await safeDelete(keyFor(id, 'tasks-current'));
  await safeDelete(keyFor(id, 'history'));
  await safeDelete(keyFor(id, 'tickers'));
  await safeDelete(keyFor(id, 'links'));
  await safeDelete(keyFor(id, 'atoms'));
  state.history = {};
  state.tickers = [];
  state.links = [];
  state.atoms = [];
  state.expandedAtomIds = new Set();
  state.tasksCurrent = { date: todayStr(), tasks: [] };
  state.expandedIds = new Set();
  await persistCurrent();
  renderAll();
}

init();
</script>
